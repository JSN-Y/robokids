openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: RoboKids API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: user
  - name: chapters
  - name: shop
  - name: leaderboard
  - name: admin

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out
      responses:
        "200":
          description: Logged out

  /me:
    get:
      operationId: getMe
      tags: [user]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated

  /me/progress:
    get:
      operationId: getProgress
      tags: [user]
      summary: Get user progress
      responses:
        "200":
          description: Progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Progress"

  /me/inventory:
    get:
      operationId: getInventory
      tags: [user]
      summary: Get user inventory
      responses:
        "200":
          description: Inventory
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryItem"

  /chapters:
    get:
      operationId: listChapters
      tags: [chapters]
      summary: List all chapters with levels
      responses:
        "200":
          description: Chapters list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Chapter"

  /levels/{id}:
    get:
      operationId: getLevel
      tags: [chapters]
      summary: Get a level by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Level
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Level"
        "404":
          description: Not found

  /attempts:
    post:
      operationId: submitAttempt
      tags: [chapters]
      summary: Submit a level attempt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttemptInput"
      responses:
        "200":
          description: Attempt result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttemptResult"

  /shop/items:
    get:
      operationId: listShopItems
      tags: [shop]
      summary: List shop items
      responses:
        "200":
          description: Shop items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ShopItem"

  /shop/purchase:
    post:
      operationId: purchaseItem
      tags: [shop]
      summary: Purchase a shop item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PurchaseInput"
      responses:
        "200":
          description: Purchased
        "400":
          description: Insufficient funds or already owned

  /leaderboard:
    get:
      operationId: getLeaderboard
      tags: [leaderboard]
      summary: Get leaderboard
      responses:
        "200":
          description: Leaderboard
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntry"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get admin stats
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/students:
    get:
      operationId: listStudents
      tags: [admin]
      summary: List all students
      responses:
        "200":
          description: Students
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StudentSummary"
    post:
      operationId: createStudent
      tags: [admin]
      summary: Create a student
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /admin/students/{id}:
    get:
      operationId: getStudent
      tags: [admin]
      summary: Get student detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Student detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentDetail"
    put:
      operationId: updateStudent
      tags: [admin]
      summary: Update a student
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteStudent
      tags: [admin]
      summary: Delete a student
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    LoginInput:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    User:
      type: object
      required: [id, username, role]
      properties:
        id:
          type: integer
        username:
          type: string
        displayName:
          type: ["string", "null"]
        role:
          type: string
        coins:
          type: integer
        hearts:
          type: integer
        category:
          type: ["integer", "null"]
        currentLevelId:
          type: ["integer", "null"]
        currentChapterId:
          type: ["integer", "null"]

    Progress:
      type: object
      required: [completedLevelIds]
      properties:
        completedLevelIds:
          type: array
          items:
            type: integer
        totalCoins:
          type: integer
        totalHearts:
          type: integer

    InventoryItem:
      type: object
      required: [id, shopItemId]
      properties:
        id:
          type: integer
        shopItemId:
          type: integer
        purchasedAt:
          type: string

    LevelSummary:
      type: object
      required: [id, title, difficulty, coinReward]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        difficulty:
          type: string
        coinReward:
          type: integer
        order:
          type: integer

    Chapter:
      type: object
      required: [id, title, levels]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        order:
          type: integer
        levels:
          type: array
          items:
            $ref: "#/components/schemas/LevelSummary"

    Level:
      type: object
      required: [id, title, chapterId, difficulty, coinReward]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        chapterId:
          type: integer
        difficulty:
          type: string
        coinReward:
          type: integer
        config:
          type: object
          additionalProperties: true
        order:
          type: integer

    AttemptInput:
      type: object
      required: [levelId, success]
      properties:
        levelId:
          type: integer
        success:
          type: boolean

    AttemptResult:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        coinsEarned:
          type: integer
        heartsRemaining:
          type: integer
        nextLevelId:
          type: ["integer", "null"]

    ShopItem:
      type: object
      required: [id, name, price, category]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: integer
        category:
          type: string
        icon:
          type: ["string", "null"]
        rarity:
          type: ["string", "null"]
        statBonus:
          type: ["integer", "null"]

    PurchaseInput:
      type: object
      required: [shopItemId]
      properties:
        shopItemId:
          type: integer

    LeaderboardEntry:
      type: object
      required: [id, username, coins, completedLevels]
      properties:
        id:
          type: integer
        username:
          type: string
        displayName:
          type: ["string", "null"]
        coins:
          type: integer
        completedLevels:
          type: integer

    AdminStats:
      type: object
      required: [totalStudents, totalCoinsEarned, totalAttemptsToday, studentsPerCategory, recentActivity]
      properties:
        totalStudents:
          type: integer
        totalCoinsEarned:
          type: integer
        totalAttemptsToday:
          type: integer
        studentsPerCategory:
          type: object
          properties:
            category1:
              type: integer
            category2:
              type: integer
            category3:
              type: integer
          required: [category1, category2, category3]
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/ActivityItem"

    ActivityItem:
      type: object
      required: [username, levelTitle, success]
      properties:
        username:
          type: string
        displayName:
          type: ["string", "null"]
        levelTitle:
          type: string
        success:
          type: boolean

    StudentSummary:
      type: object
      required: [id, username, coins, completedLevels]
      properties:
        id:
          type: integer
        username:
          type: string
        displayName:
          type: ["string", "null"]
        category:
          type: ["integer", "null"]
        coins:
          type: integer
        completedLevels:
          type: integer

    StudentDetail:
      type: object
      required: [id, username, coins, hearts, completedLevelIds]
      properties:
        id:
          type: integer
        username:
          type: string
        displayName:
          type: ["string", "null"]
        category:
          type: ["integer", "null"]
        coins:
          type: integer
        hearts:
          type: integer
        completedLevelIds:
          type: array
          items:
            type: integer
        recentAttempts:
          type: array
          items:
            $ref: "#/components/schemas/AttemptSummary"

    AttemptSummary:
      type: object
      required: [levelId, levelTitle, success, createdAt]
      properties:
        levelId:
          type: integer
        levelTitle:
          type: string
        success:
          type: boolean
        createdAt:
          type: string

    StudentInput:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        displayName:
          type: string
        password:
          type: string
        category:
          type: integer
        coins:
          type: integer

    StudentUpdate:
      type: object
      properties:
        displayName:
          type: string
        password:
          type: string
        category:
          type: integer
        coins:
          type: integer
        hearts:
          type: integer
